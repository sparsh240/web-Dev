<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav bar using Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-content">
                <div class="left">
                    <img class="logo" src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE-logo.svg" alt="logo">
                </div>
                <div class="middle">
                    <ul class="options">
                        <li>
                            <a>Products &#x25BE;</a>
                        </li>
                        <li>
                            <a>Buy &#x25BE;</a>
                        </li>
                        <li>
                            <a>Renew &#x25BE;</a>
                        </li>
                        <li>
                            <a>Support &#x25BE;</a>
                        </li>
                        <li>
                            <a>Company &#x25BE;</a>
                        </li>
                    </ul>
                </div>
                <div class="right">
                    <ul class="right-options">
                        <li class="download">
                            <a>Download</a>
                        </li>
                        <li  class="language">
                            <a>English</a>
                        </li>
                    </ul>
                    <div class="search"></div>
                </div>
            </div>
        </nav>
    </header>
</body>
</html>
