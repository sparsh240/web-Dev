<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Propercy CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .parent{
            background-color: rgb(0, 168, 168);
            border: 2px solid black;
            margin:10px;
            padding:1px;
            height:200vw;
            position: relative;
            
        }
        .b {
            width: 500px;
            height: 10vw;
            border: 2px solid black;
            margin: 9px 10px;
        }

        .b1 {
            background-color: red;
            position: relative;
            z-index: 1;
        }

        .b2 {
            background-color: rgb(0, 255, 38);
            position: relative;
            bottom: 40px;
            left: 40px;
        }

        .b3 {
            background-color: rgb(38, 0, 255);
            position: fixed;
            top:50vh;
            
        }

        .b4 {
            background-color: rgb(242, 255, 0);
            position:absolute;
            bottom:0px;
            right:0px;
        }

        .b5{
            position: sticky;
            top:0px ;
            background-color: bisque;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="b b1"></div>
        <div class="b b2"></div>
        <div class="b b3"></div>
        <div class="b b4"></div>
        <div class="b b5"></div>
    </div>
</body>

</html>
