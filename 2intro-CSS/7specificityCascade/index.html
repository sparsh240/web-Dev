<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specificity</title>
    <style>
        .one{
            background-color: rgb(190, 65, 65);
        }
        .three{
            background-color: rgb(0, 255, 157);
        }

        #four{
            background-color: aqua;
        }

        .two{
            background-color: rgb(0, 13, 255);
        }

        [custom="wow"]{
            background-color: rgb(248, 193, 127);
        }

        .five{
            background-color: brown !important;
        }

        
    </style>
</head>
<body>
    <h1 class="one two three">WowowoW - CLASSES</h1>
    <h1 id="four" class="one two three">WowowoW - ID</h1>
    <h1 custom="wow" class="one two three">WowowoW - attribute</h1>
    <h1 style="background-color: black;" class="five">WOW - important</h1>
</body>
</html>
