<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        .i0{
            filter:invert(1) opacity(0.4);
        }
        
        .i1{
            filter:brightness(140%);
        }
        .i2{
            filter:blur(2px) contrast(0.4);
        }
        .i3{
            filter:grayscale(80%)
        }
    </style>
</head>
<body>
    <img class="i0"src="image.png">
    <img class="i1"src="image.png">
    <img class="i2"src="image.png">
    <img class="i3"src="image.png">
    
</body>
</html>
