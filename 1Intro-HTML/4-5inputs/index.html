<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is my info site with forms and inputs">
    <title>Form and Input</title>
</head>
<body>
    <h1>My Heading</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Soluta placeat repellendus, consequuntur expedita totam eveniet eum quae officia, eligendi asperiores facere ut similique nobis amet optio aut voluptatum, distinctio nemo quos blanditiis numquam.</p>

    <form action="post">
        <label for="username" autofocus>Enter The Username</label>
        <input type="text" placeholder="John Doe" id="username">

        <div>
            <input id="male-check" type="radio" value="male" name="gender">
            <label for="male-check">Male</label>
            <input id="female-check" type="radio" value="female" name="gender">
            <label for="female-check">Female</label>
        </div>

        <div>
            <input id="subscribe" type="checkbox" required>
            <label for="subscribe">Accept Policy</label>
        </div>

        <div>
            <label for="comment">Enter your comment</label>
            <br>
            <textarea id="comment" name="nameee" rows="4" cols="50" ></textarea>
        </div>

        <div>
            <select name="fruits">
                <option value="cherry">Cherry</option>
                <option value="apple">Apple</option>
                <option value="banana">BANANAAA</option>
            </select>
        </div>

    </form>
</body>
</html>
