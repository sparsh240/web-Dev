<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Video Media</title>
</head>
<body>
    <video width="300px" src="./media/video.mp4" controls poster="./media/image.png"></video>
    <audio src="./media/audio.mp3" controls></audio>
    <svg height=100px width=100px>
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
    </svg> 
    <img src="./media/file.svg" alt="not found">
    <h1>Canva iframe , same for youtube videos or any website</h1>
    <iframe src="https://canva.com" width="400px" height="400px"></iframe>
    
    
</body>
</html>
