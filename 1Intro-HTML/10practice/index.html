<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player</title>
</head>
<body>
    <header>
        <h1>Media Viewer</h1>
    </header>
    <main>
        <div>
            <h2>Audios</h2>
            <div>
                <audio src="./audios/1.mp3" alt="not found" controls></audio>
                <audio src="./audios/2.mp3" alt="not found" controls></audio>
                <audio src="./audios/3.mp3" alt="not found" controls></audio>
                <audio src="./audios/4.mp3" alt="not found" controls></audio>
                <audio src="./audios/5.mp3" alt="not found" controls></audio>
                <audio src="./audios/6.mp3" alt="not found" controls></audio>
            </div>
            
            <h2>Videos</h2>
            <div>
                <video src="./videos/1.mp4" width="300px" controls></video>
                <video src="./videos/2.mp4" width="300px" controls></video>
                <video src="./videos/3.mp4" width="300px" controls></video>
                <video src="./videos/4.mp4" width="300px" controls></video>
                <video src="./videos/5.mp4" width="300px" controls></video>
                <video src="./videos/6.mp4" width="300px" controls></video>
            </div>

            <footer>End</footer>
        </div>
    </main>
    
</body>
</html>
