<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images-Tables-Lists</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="image.png" width="500px" alt="taking picture of sunset on an empty road">

    <table>
        <caption>Student info</caption>
        <tr>
            <th>Roll No</th>
            <th>Class</th>
            <th>Name</th>
        </tr>
        <tr>
            <td colspan="3">11</td>
            <td rowspan="2">VII</td>
            <td>Aditya Prasad</td>
        </tr>
        <tr>
            <td >21</td>
            <td>XII</td>
            <td>Nidhi Sharma</td>
        </tr>
    </table>

    <ol type="I">
        <li>content A</li>
        <li>content B</li>
        <li>content C</li>
    </ol>
    <ol type="i"> 
        <li>content A</li>
        <li>content B</li>
        <li>content C</li>
    </ol>

    <ol type="A"> 
        <li>content 1</li>
        <li>content 2</li>
        <li>content 3</li>
    </ol>

    <ul type="square"> 
        <li>content A</li>
        <li>content B</li>
        <li>content C</li>
    </ul>
    <ul type="disc"> 
        <li>content A</li>
        <li>content B</li>
        <li>content C</li>
    </ul>
</body>
</html>
